<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVision | Sorting Visualizer</title>
    <meta name="description"
        content="A real-time, interactive sorting algorithm visualizer. Step-by-step execution for Bubble, Merge, and Quick sort.">
    <meta name="keywords" content="AlgoVision, Sorting Visualizer, Algorithm Animation">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section id="welcome-screen" class="screen active">
        <div class="hero-content">
            <h1>AlgoVision</h1>
            <p>Master Data Structures & Algorithms through interactive visualization.</p>
            <button id="get-started-btn" class="primary-btn">Get Started</button>
        </div>
    </section>

    <section id="dashboard-screen" class="screen hidden">
        <h2>Select a Workspace</h2>
        <div class="category-grid">
            <div class="category-card">
                <h3>Sorting Algorithms</h3>
                <p>Visualize Bubble, Merge, and Quick Sort in real-time.</p>
                <button id="open-sorting-btn" class="primary-btn">Launch Workspace</button>
            </div>

            <div class="category-card locked">
                <h3>Pathfinding Grid</h3>
                <p>Dijkstra, A*, and BFS.</p>
                <button disabled>Coming in Phase 2</button>
            </div>
        </div>
    </section>

    <section id="workspace-screen" class="screen hidden">
        <div class="workspace-nav">
            <button id="back-to-dashboard-btn" class="secondary-btn">← Back to Dashboard</button>
        </div>

    </section>

    <script src="app.js"></script>
    <script src="algorithms.js"></script>
    <script src="visualizer.js"></script>
</body>

</html>
