<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVision | DSA Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="welcome-screen" class="screen active">
        <div class="hero-content">
            <h1>AlgoVision</h1>
            <p>Master Data Structures & Algorithms through interactive visualization.</p>
            <button id="get-started-btn" class="primary-btn">Get Started</button>
        </div>
    </section>

    <section id="dashboard-screen" class="screen hidden">
        <div class="main-dashboard-wrapper">
            <aside class="dashboard-sidebar">
                <h2>Categories</h2>
                <ul class="sidebar-nav">
                    <li class="active" data-target="array"><span class="ds-icon">›</span> Array</li>
                    <li data-target="stack" class="dimmed"><span class="ds-icon">›</span> Stack</li>
                    <li data-target="queue" class="dimmed"><span class="ds-icon">›</span> Queue</li>
                </ul>
            </aside>
            <main class="dashboard-stage">
                <header class="dashboard-header">
                    <h2>Select a Workspace</h2>
                </header>
                <div class="dashboard-container"></div>
            </main>
        </div>
    </section>

    <section id="workspace-screen" class="screen hidden">
        <header id="workspace-header" class="modern-nav">
            <div id="home-link" class="nav-brand">
                <span class="text-white">Algo</span><span class="text-blue">Vision</span>
            </div>
            <div class="nav-center">
                <span id="nav-title" class="current-algo-pill">ALGORITHM</span>
            </div>
            <div class="nav-spacer"></div>
        </header>

        <div class="theory-wrapper">
            <div class="theory-panel">
                <h3>How it Works</h3>
                <p id="algo-description">Algorithm description...</p>
                <div class="complexity-badges">
                    <div class="badge">⏱️ Worst Case: <span id="time-worst" class="time-color">O(n)</span></div>
                    <div class="badge">💾 Space Complexity: <span id="space-complexity" class="space-color">O(1)</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div id="dynamic-controls" class="controls-panel"></div>
        </div>

        <main class="visualizer-arena">
            <div id="status-bar" class="status-message hidden"></div>
            <div id="visualizer-container"></div>
        </main>

        <div class="code-wrapper">
            <div class="code-panel">
                <div class="code-header">
                    <div class="code-tabs">
                        <button class="tab-btn active">JS</button>
                        <button class="tab-btn">Python</button>
                        <button class="tab-btn">C++</button>
                    </div>
                    <button id="copy-btn" class="copy-btn">📋 Copy Code</button>
                </div>
                <pre><code id="code-snippet"></code></pre>
            </div>
        </div>
    </section>

    <script src="js/data.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/Algorithms/search.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
