<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVision | DSA Visualizer</title>
    <meta name="description" content="A real-time, interactive sorting algorithm visualizer.">
    <meta name="keywords" content="AlgoVision, Sorting Visualizer, Algorithm Animation, Data Structures">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="welcome-screen" class="screen active">
        <div class="hero-content">
            <h1>AlgoVision</h1>
            <p>Master Data Structures & Algorithms through interactive visualization.</p>
            <button id="get-started-btn" class="primary-btn">Get Started</button>
        </div>
    </section>

    <section id="dashboard-screen" class="screen hidden">
        <div class="dashboard-header">
            <h2>Select a Workspace</h2>
        </div>

        <div class="dashboard-container">

            <div class="ds-section">
                <h2><span class="ds-icon">›</span> Array</h2>

                <div class="ds-category">
                    <h3>Searching</h3>
                    <div class="card-grid">
                        <button class="algo-card" data-target="linear-search">Linear Search <span
                                class="arrow">›</span></button>
                        <button class="algo-card" data-target="binary-search">Binary Search <span
                                class="arrow">›</span></button>
                    </div>
                </div>

                <div class="ds-category">
                    <h3>Sorting</h3>
                    <div class="card-grid">
                        <button id="open-sorting-btn" class="algo-card" data-target="bubble-sort">Bubble Sort <span
                                class="arrow">›</span></button>
                        <button class="algo-card" data-target="selection-sort">Selection Sort <span
                                class="arrow">›</span></button>
                        <button class="algo-card" data-target="insertion-sort">Insertion Sort <span
                                class="arrow">›</span></button>
                        <button class="algo-card" data-target="merge-sort">Merge Sort <span
                                class="arrow">›</span></button>
                        <button class="algo-card" data-target="quick-sort">Quick Sort <span
                                class="arrow">›</span></button>
                    </div>
                </div>
            </div>

            <div class="ds-section">
                <h2><span class="ds-icon">›</span> Stack</h2>

                <div class="ds-category">
                    <h3>Operations</h3>
                    <div class="card-grid">
                        <button class="algo-card" data-target="stack-push-pop">Push & Pop <span
                                class="arrow">›</span></button>
                        <button class="algo-card" data-target="stack-peek">Peek <span class="arrow">›</span></button>
                        <button class="algo-card" data-target="stack-empty">Is Empty <span
                                class="arrow">›</span></button>
                        <button class="algo-card" data-target="stack-full">Is Full <span class="arrow">›</span></button>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <section id="workspace-screen" class="screen hidden">
        <div class="workspace-nav">
            <button id="back-to-dashboard-btn" class="secondary-btn">← Back to Dashboard</button>
        </div>
    
        <header id="controls-zone">
            <h1 id="workspace-title">Select an Algorithm</h1>
            <div id="dynamic-controls" class="controls">
            </div>
        </header>
    
        <main class="visualizer-arena"
            style="min-height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; margin: 20px; border-radius: 8px; position: relative;">
        
            <div id="status-bar" class="status-message hidden">Waiting for input...</div>
        
            <div id="visualizer-container"
                style="display: flex; gap: 5px; align-items: flex-end; height: 100px; margin-top: 20px;">
            </div>
        </main>
    
        <footer id="info-zone" class="split-layout" style="display: flex; gap: 20px; padding: 20px;">
            <div class="theory-panel"
                style="flex: 1; background: #1e293b; padding: 20px; border-radius: 8px; color: #e2e8f0;">
                <h3 style="color: #3b82f6;">How it Works</h3>
                <p id="algo-description" style="line-height: 1.6; margin-bottom: 20px;">Description goes here...</p>
    
                <div class="complexities" style="background: #0f172a; padding: 15px; border-radius: 6px;">
                    <p><strong>Time (Worst):</strong> <span id="time-worst" style="color: #ef4444;">-</span></p>
                    <p><strong>Space:</strong> <span id="space-complexity" style="color: #10b981;">-</span></p>
                </div>
            </div>
    
            <div class="code-panel" style="flex: 1; background: #1e293b; padding: 20px; border-radius: 8px;">
                <div class="code-tabs" style="margin-bottom: 10px; display: flex; gap: 10px;">
                    <button class="tab-btn active" data-lang="javascript">JS</button>
                    <button class="tab-btn" data-lang="python">Python</button>
                    <button class="tab-btn" data-lang="cpp">C++</button>
                </div>
                <pre
                    style="background: #0f172a; padding: 15px; border-radius: 6px; overflow-x: auto;"><code id="code-snippet" style="color: #e2e8f0; font-family: monospace;">// Code will appear here</code></pre>
            </div>
        </footer>
    </section>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/algorithms.js"></script>
    <script src="js/visualizer.js"></script>
</body>

</html>
