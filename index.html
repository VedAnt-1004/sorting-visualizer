<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVision | DSA Visualizer</title>
    <meta name="description" content="A real-time, interactive sorting algorithm visualizer.">
    <meta name="keywords" content="AlgoVision, Sorting Visualizer, Algorithm Animation, Data Structures">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="welcome-screen" class="screen active">
        <div class="hero-content">
            <h1>AlgoVision</h1>
            <p>Master Data Structures & Algorithms through interactive visualization.</p>
            <button id="get-started-btn" class="primary-btn">Get Started</button>
        </div>
    </section>

    <section id="dashboard-screen" class="screen hidden">
        <div class="dashboard-container" style="max-width: 1200px; margin: 0 auto; padding: 40px 20px; color: white;">

            <div class="ds-section"
                style="background: #111; border: 1px solid #222; border-radius: 8px; margin-bottom: 30px; padding: 20px;">
                <h2 style="margin-top: 0; display: flex; align-items: center; gap: 10px;">
                    <span style="color: #3b82f6;">›</span> Array
                </h2>

                <div class="ds-category" style="margin-top: 20px;">
                    <h3 style="border-left: 3px solid #3b82f6; padding-left: 10px; font-size: 16px; color: #ccc;">
                        Searching</h3>
                    <div class="card-grid" style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px;">
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Linear
                            Search <span style="color: #666;">›</span></button>
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Binary
                            Search <span style="color: #666;">›</span></button>
                    </div>
                </div>

                <div class="ds-category" style="margin-top: 30px;">
                    <h3 style="border-left: 3px solid #3b82f6; padding-left: 10px; font-size: 16px; color: #ccc;">
                        Sorting</h3>
                    <div class="card-grid" style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px;">
                        <button id="open-sorting-btn" class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Bubble
                            Sort <span style="color: #666;">›</span></button>
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Selection
                            Sort <span style="color: #666;">›</span></button>
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Insertion
                            Sort <span style="color: #666;">›</span></button>
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Merge
                            Sort <span style="color: #666;">›</span></button>
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Quick
                            Sort <span style="color: #666;">›</span></button>
                    </div>
                </div>
            </div>

            <div class="ds-section"
                style="background: #111; border: 1px solid #222; border-radius: 8px; margin-bottom: 30px; padding: 20px;">
                <h2 style="margin-top: 0; display: flex; align-items: center; gap: 10px;">
                    <span style="color: #3b82f6;">›</span> Stack
                </h2>

                <div class="ds-category" style="margin-top: 20px;">
                    <h3 style="border-left: 3px solid #3b82f6; padding-left: 10px; font-size: 16px; color: #ccc;">
                        Operations</h3>
                    <div class="card-grid" style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px;">
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Push
                            & Pop <span style="color: #666;">›</span></button>
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Peek
                            <span style="color: #666;">›</span></button>
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Is
                            Empty <span style="color: #666;">›</span></button>
                        <button class="algo-card"
                            style="background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; width: 200px;">Is
                            Full <span style="color: #666;">›</span></button>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <section id="workspace-screen" class="screen hidden">
        <div class="workspace-nav" style="padding: 10px 20px; background: #0f172a;">
            <button id="back-to-dashboard-btn" class="secondary-btn"
                style="background: transparent; color: white; border: 1px solid #334155; padding: 8px 16px; border-radius: 6px; cursor: pointer;">←
                Back to Dashboard</button>
        </div>

        <header style="padding: 20px; text-align: center; color: white;">
            <h1 id="workspace-title">Sorting Visualizer</h1>
            <div class="controls" style="margin-top: 15px;">
                <button id="new-array-btn" style="padding: 8px 16px; margin: 0 5px;">New Array</button>
                <div class="slider-container" style="display: inline-block; margin: 0 15px;">
                    <label>Size: <input type="range" id="size-slider" min="5" max="100" value="50"></label>
                    <label>Speed: <input type="range" id="speed-slider" min="1" max="100" value="50"></label>
                </div>
                <select id="algo-select" style="padding: 8px; margin: 0 5px;">
                    <option value="bubble">Bubble Sort</option>
                    <option value="merge">Merge Sort</option>
                    <option value="quick">Quick Sort</option>
                </select>
                <button id="sort-btn"
                    style="padding: 8px 16px; margin: 0 5px; background: #3b82f6; color: white; border: none; border-radius: 4px;">Sort!</button>
            </div>
        </header>

        <main class="split-layout" style="display: flex; padding: 20px; gap: 20px;">
            <div id="visualizer-container" style="flex: 2; height: 60vh; background: #1e293b; border-radius: 8px;">
            </div>
            <div id="code-display"
                style="flex: 1; background: #0f172a; padding: 20px; border-radius: 8px; color: #10b981; font-family: monospace;">
                <pre><code id="pseudo-code">// Algorithm code will appear here</code></pre>
            </div>
        </main>
    </section>

    <script src="js/app.js"></script>
    <script src="js/algorithms.js"></script>
    <script src="js/visualizer.js"></script>
</body>

</html>
